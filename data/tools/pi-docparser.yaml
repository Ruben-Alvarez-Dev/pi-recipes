id: pi-docparser
name: Pi DocParser
npm: "pi-docparser"
category: documentation
description: Document parser for Pi — extracts structured information from documentation files (PDF, DOCX, markdown) for agent consumption.
capabilities:
  - document-parsing
  - pdf-extraction
  - docx-extraction
  - markdown-parsing
  - structured-extraction
ideal_use_cases:
  - scenario: Extracting requirements from a PDF specification document
    why: Converts PDF content into structured data the agent can work with
    model_hint: mimo-v2.5-pro
  - scenario: Reading API documentation from DOCX files
    why: DOCX extraction provides clean text the agent can reference
  - scenario: Parsing large markdown documentation sets
    why: Handles complex markdown with tables, code blocks, and nested structures
anti_patterns:
  - scenario: Real-time document editing or creation
    why: Parser is read-only — cannot create or modify documents
    alternative: direct-editing
  - scenario: Scanning for information in already-indexed codebases
    why: Designed for external documents, not code search
    alternative: grep-search
dependencies: []
thinking_level: low
notes: Read-only tool. Supports common document formats. Extracts text and structure for agent consumption.
version: "latest"
