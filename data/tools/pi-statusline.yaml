id: pi-statusline
name: Pi Statusline
npm: "@feniix/pi-statusline"
category: meta
description: Fixed two-line status footer for Pi with model, thinking, context, git, token, worktree, and skill indicators.
capabilities:
  - status-display
  - model-indicator
  - thinking-indicator
  - context-indicator
  - git-indicator
  - token-indicator
  - worktree-indicator
  - skill-indicator
ideal_use_cases:
  - scenario: Monitoring Pi's state at a glance during development
    why: Two-line footer shows all critical information without interrupting workflow
    model_hint: mimo-v2.5-pro
  - scenario: Tracking token usage and context consumption in real-time
    why: Token and context indicators help manage the conversation budget
  - scenario: Knowing which model and thinking level is active
    why: Model and thinking indicators prevent confusion during model switches
anti_patterns:
  - scenario: Minimal TUI configurations where screen space is precious
    why: Two-line footer consumes terminal space — problematic on small screens
    alternative: default-footer
  - scenario: Automated sessions where no one is looking at the status
    why: Visual indicators provide no value without a human observer
    alternative: none-needed
dependencies: []
thinking_level: low
notes: Purely cosmetic — adds visual indicators but no functional changes. Essential for monitoring the complex 53-extension setup.
version: "latest"
