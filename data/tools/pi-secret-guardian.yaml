id: pi-secret-guardian
name: Pi Secret Guardian
npm: "@0xkobold/pi-secret-guardian"
category: security
description: Secret detection and pi-share-hf integration — scans projects, sessions, and environment for secrets and syncs findings to the pi-share-hf workspace.
capabilities:
  - secret-scanning
  - environment-scanning
  - session-scanning
  - pi-share-hf-integration
  - secret-collection
  - upload-pipeline
ideal_use_cases:
  - scenario: Comprehensive secret audit across project, session, and environment
    why: Scans all three surfaces — project files, conversation history, and environment variables
    model_hint: mimo-v2.5-pro
  - scenario: Syncing detected secrets to a centralized workspace for team review
    why: pi-share-hf integration enables collaborative secret management
anti_patterns:
  - scenario: Projects that don't use pi-share-hf
    why: Collection and upload pipeline depends on pi-share-hf — less useful without it
    alternative: pi-secret-guard
  - scenario: Quick local secret checks
    why: Full scanning pipeline is overkill for a fast local check
    alternative: pi-secret-guard
dependencies: []
thinking_level: low
notes: Part of @0xkobold ecosystem. More comprehensive than pi-secret-guard but requires pi-share-hf for full functionality. Use pi-secret-guard for lightweight detection.
version: "latest"
