id: lsp-pi
name: LSP Pi
npm: "lsp-pi"
category: infrastructure
description: Language Server Protocol integration for Pi — provides diagnostics, type-checking, and structural analysis for Dart/Flutter, TypeScript, Vue, Svelte, Python, Go, Kotlin, Swift, and Rust.
capabilities:
  - lsp-diagnostics
  - type-checking
  - multi-language-support
  - real-time-feedback
ideal_use_cases:
  - scenario: Getting instant TypeScript type errors while coding
    why: Integrates tsserver directly — no need to save and run tsc manually
    model_hint: mimo-v2.5-pro
  - scenario: Catching Flutter/Dart errors before running the app
    why: Dart analysis server integration catches issues the agent might miss
  - scenario: Multi-language projects needing consistent diagnostics
    why: Supports 9 languages with a unified interface
anti_patterns:
  - scenario: Projects using obscure languages not in the supported set
    why: Only supports 9 specific languages — others get no diagnostics
    alternative: manual-linting
  - scenario: Simple shell scripts or configuration files
    why: LSP is overkill for bash scripts and YAML configs
    alternative: direct-execution
dependencies: []
thinking_level: low
notes: Requires language servers to be installed on the system. Not all LSP features are available for every language — check the README for language-specific support matrix.
version: "latest"
