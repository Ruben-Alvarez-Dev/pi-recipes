id: pi-secret-guard
name: Pi Secret Guard
npm: "pi-secret-guard"
category: security
description: Guards against committing secrets, API keys, and credentials to git repositories using hybrid regex + LLM review.
capabilities:
  - secret-detection
  - pre-commit-scanning
  - regex-pattern-matching
  - llm-review
  - hybrid-detection
ideal_use_cases:
  - scenario: Preventing accidental credential commits in a code review
    why: Hybrid regex + LLM catches both known patterns (regex) and novel secret formats (LLM)
    model_hint: mimo-v2.5-pro
    recipe_hint: security-audit
  - scenario: Scanning a codebase for accidentally committed secrets
    why: Can scan existing commits and files for leaked credentials
anti_patterns:
  - scenario: Projects with intentionally committed public tokens or test credentials
    why: False positives on intentional public secrets — need allowlists
    alternative: manual-review
  - scenario: Environments where LLM calls are too expensive or slow
    why: LLM review adds latency and cost to every commit
    alternative: regex-only-tools
dependencies: []
thinking_level: low
notes: Hybrid approach — regex for known patterns, LLM for novel formats. Complements secret-guardian which focuses on environment scanning.
version: "latest"
