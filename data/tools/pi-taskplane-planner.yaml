id: pi-taskplane-planner
name: Taskplane Planner
npm: "@casualjim/pi-taskplane-planner"
category: planning
description: Planner-native Pi extension and CLI companion to Taskplane — bridges Pi's planning capabilities with external task management via the Taskplane platform.
capabilities:
  - taskplane-integration
  - external-planning
  - cli-companion
  - platform-bridging
ideal_use_cases:
  - scenario: Managing tasks that span both Pi sessions and external project management
    why: Bridges local Pi planning with Taskplane's external platform
    model_hint: mimo-v2.5-pro
  - scenario: Teams using Taskplane for project management
    why: Direct integration means no manual copying between Pi and the task platform
anti_patterns:
  - scenario: Teams not using Taskplane
    why: Entirely dependent on the Taskplane platform — useless without it
    alternative: pi-task
  - scenario: Simple task tracking needs
    why: External platform adds complexity for basic tracking
    alternative: pi-task
dependencies: []
thinking_level: low
notes: Requires a Taskplane account. Part of the @casualjim ecosystem which also provides pi-boomerang.
version: "latest"
