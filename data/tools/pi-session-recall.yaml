id: pi-session-recall
name: Pi Session Recall
npm: "@ogulcancelik/pi-session-recall"
category: memory
description: Search and query past Pi sessions — recall previous conversations on demand by searching through session history.
capabilities:
  - session-search
  - conversation-recall
  - history-querying
  - context-restoration
ideal_use_cases:
  - scenario: "What did we work on last week?"
    why: Search past sessions by topic, file, or keyword to find previous work
    model_hint: mimo-v2.5-pro
  - scenario: Continuing work from a previous session
    why: Recall the exact conversation context to pick up where you left off
  - scenario: Finding a solution discussed in an earlier session
    why: Search through conversation history to retrieve previously discussed solutions
anti_patterns:
  - scenario: Fresh sessions with no history
    why: No sessions to recall — the tool is useless until conversation history accumulates
    alternative: fresh-start
  - scenario: Finding specific file changes (not conversations)
    why: Searches conversation text, not git diffs — for file changes use git log
    alternative: git-log-search
dependencies: []
thinking_level: low
notes: Only searches sessions that have been saved. Coverage depends on how often sessions are persisted.
version: "latest"
