id: pi-computer-use
name: Pi Computer Use
npm: "@injaneity/pi-computer-use"
category: infrastructure
description: Codex-style computer-use tools for Pi on macOS — screen capture, mouse/keyboard control, and visual interaction for tasks that require GUI access.
capabilities:
  - screen-capture
  - mouse-control
  - keyboard-control
  - visual-interaction
  - gui-automation
ideal_use_cases:
  - scenario: Testing a web application by visually inspecting the rendered output
    why: Screen capture lets the agent see what the user sees — catch visual bugs
    model_hint: mimo-v2.5-pro
  - scenario: Automating GUI workflows that have no CLI equivalent
    why: Mouse/keyboard control enables interaction with any macOS application
  - scenario: Debugging layout issues by capturing screenshots at different states
    why: Visual feedback is essential for CSS and layout debugging
anti_patterns:
  - scenario: Server environments or headless systems
    why: Requires a display — completely dependent on macOS GUI
    alternative: cli-only-tools
  - scenario: Tasks that can be accomplished via CLI
    why: GUI automation is slower and less reliable than direct CLI commands
    alternative: pi-toolchain
  - scenario: Linux or Windows environments
    why: macOS only
    alternative: platform-specific-tools
dependencies: []
thinking_level: medium
notes: macOS only. Requires screen recording and accessibility permissions. Most powerful when combined with vision-capable models.
version: "latest"
