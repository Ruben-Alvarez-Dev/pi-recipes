id: context-audit
name: Context Audit
description: Analyze token usage and context consumption to optimize Pi configuration.
archetype: monitoring
complexity: simple
model: mimo-v2.5-pro
thinking: low
steps:
  - id: audit
    name: Token Budget Analysis
    tool: pi-token-burden
    prompt: |
      Perform a context audit:
      1. Show the complete token budget breakdown
      2. Identify the heaviest extensions and skills
      3. Recommend extensions to disable for optimal context usage
      4. Suggest configuration changes to free up context space
tags:
  - meta
  - optimization
  - context
prerequisites:
  - pi-token-burden
