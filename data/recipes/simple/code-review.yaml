id: code-review
name: Code Review
description: Focused code reasoning for evaluating code quality, patterns, and potential improvements.
archetype: review
complexity: simple
model: mimo-v2.5-pro
thinking: high
steps:
  - id: reason
    name: Code Reasoning
    tool: fenix-code-reasoning
    prompt: |
      Analyze the code with structured reasoning:
      1. Understand the intent and context
      2. Evaluate code quality metrics (readability, maintainability, performance)
      3. Identify potential bugs or edge cases
      4. Suggest specific improvements with reasoning
      5. Branch into alternative approaches if needed
tags:
  - review
  - code-quality
  - reasoning
prerequisites:
  - fenix-code-reasoning
